<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHADOW_SCORE // TACTICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="history-modal" class="modal-overlay hidden"><div class="modal-box"><div class="modal-header">HISTORY</div><div id="modal-alert-list"></div><button id="close-modal-btn">CLOSE</button></div></div>
<div id="inject-modal" class="modal-overlay hidden"><div class="modal-box" style="width:300px">INJECT_DEMO<br/><button id="inject-a">CLUSTER_ALPHA</button><button id="inject-b">CLUSTER_BETA</button><button id="inject-c">CLUSTER_GAMMA</button><button id="close-inject-btn">CLOSE</button></div></div>

<div class="viewport">
    <header class="glass-header">
        <h1 class="header-main-title">SHADOW_SCORE</h1>
        
        <div class="header-stats">
            <div class="stat-item"><span class="stat-label">TXNS</span><span id="stat-txns" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">USERS</span><span id="stat-users" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">ALERTS</span><span id="stat-alerts" class="stat-value red">0</span></div>
        </div>

        <div class="control-cluster">
            <button class="cyber-btn" id="pause-btn">| |</button>
            <button class="cyber-btn" id="inject-fraud-btn">INJECT</button>
            <button class="cyber-btn" id="refresh-btn">REFRESH</button>
            <button class="cyber-btn" id="theme-toggle-btn">M_DARK</button>
        </div>
    </header>

    <div class="workspace-grid">
        <section class="module col-3 row-4">
            <div class="module-header">SOURCES</div>
            <div class="scroll-v">
                <table class="cyber-table">
                    <thead><tr><th>ID</th><th>SCORE</th></tr></thead>
                    <tbody id="suspicious-table-body"></tbody>
                </table>
            </div>
        </section>

        <section class="module col-9 row-4">
            <div class="module-header">NETWORK_GRAPH</div>
            <div id="cy" class="cy-canvas"></div>
        </section>

        <section class="module col-3 row-2">
            <div class="module-header">ALERTS</div>
            <div id="alert-stream" class="alert-feed scroll-v"></div>
            <button class="history-btn" id="view-history-btn">VIEW_HISTORY</button>
        </section>

        <section class="module col-9 row-2">
            <div class="module-header">SIGNALS
                <div class="tab-array">
                    <button class="chip active" data-metric="shadow_score">SHADOW</button>
                    <button class="chip" data-metric="drift">DRIFT</button>
                    <button class="chip" data-metric="burst">BURST</button>
                    <button class="chip" data-metric="coord">COORD</button>
                </div>
            </div>
            <div class="chart-container"><canvas id="temporalChart"></canvas></div>
        </section>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
